<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RunMore — Set Password</title>
  <style>
    :root{
      --bg:#0b1220; --text:#e8eefc; --muted:#aab7d8;
      --border:rgba(255,255,255,.10); --shadow:0 16px 40px rgba(0,0,0,.35);
      --accent:#7c5cff; --accent2:#22c55e; --danger:#ef4444;
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color:var(--text);
      background:
        radial-gradient(900px 500px at 20% -10%, rgba(124,92,255,.45), transparent 60%),
        radial-gradient(700px 450px at 110% 10%, rgba(34,197,94,.25), transparent 55%),
        radial-gradient(800px 600px at 50% 120%, rgba(56,189,248,.18), transparent 60%),
        var(--bg);
      display:flex; align-items:center; justify-content:center;
      padding:28px 16px;
    }
    .shell{width:100%; max-width:560px}
    .top{
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:14px;
    }
    .link{
      color: rgba(232,238,252,.9);
      text-decoration:none;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      padding:8px 10px; border-radius:12px;
      transition:.12s ease;
      font-size:12.5px;
    }
    .link:hover{transform:translateY(-1px)}
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:22px;
      backdrop-filter: blur(10px);
    }
    h1{margin:0; font-size:20px}
    .subtitle{margin:6px 0 14px; color:var(--muted); font-size:13.5px}
    label{font-size:12px; color:var(--muted); display:block; margin:0 0 6px}
    .field{
      width:100%;
      padding:12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(5,10,22,.35);
      color:var(--text);
      outline:none;
      transition:.18s ease;
    }
    .field:focus{
      border-color: rgba(124,92,255,.7);
      box-shadow: 0 0 0 4px rgba(124,92,255,.18);
    }
    .btn{
      width:100%;
      border:0;
      border-radius:14px;
      padding:12px 14px;
      font-weight:800;
      color:#081022;
      background: linear-gradient(135deg, rgba(124,92,255,1), rgba(34,197,94,.95));
      cursor:pointer;
      margin-top:6px;
    }
    .msg{
      border-radius:14px;
      padding:10px 12px;
      margin:0 0 12px 0;
      border:1px solid rgba(255,255,255,.12);
      font-size:13px;
    }
    .msg.error{background: rgba(239,68,68,.12); border-color: rgba(239,68,68,.22);}
    .msg.success{background: rgba(34,197,94,.12); border-color: rgba(34,197,94,.22);}
    .grid{display:grid; gap:12px}
    .pill{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color: rgba(232,238,252,.9);
      font-size:12px;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="top">
      <a class="link" href="{{ url_for('login_page') }}">← Back to login</a>
      <span class="pill">Account: {{ username }}</span>
    </div>

    <div class="card">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="msg {{category}}">{{message}}</div>
        {% endfor %}
      {% endwith %}

      <h1>Set your password</h1>
      <div class="subtitle">Choose something you can remember (minimum 8 characters).</div>

      <form class="grid" method="post" action="/set-password" autocomplete="new-password">
        <div>
          <label>New password</label>
          <input class="field" name="password" type="password" placeholder="••••••••" required />
        </div>

        <div>
          <label>Confirm password</label>
          <input class="field" name="password2" type="password" placeholder="••••••••" required />
        </div>

        <button class="btn" type="submit">Set password</button>
      </form>
    </div>
  </div>
</body>
</html>
